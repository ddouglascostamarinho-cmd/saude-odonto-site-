    <path d="M80 0C60 0 45 12 40 30C35 12 20 0 0 0C-20 0-40 16-40 55C-40 94-28 130-14 155L0 210C3 225 10 232 18 232C26 232 33 225 36 210L40 175L44 210C47 225 54 232 62 232C70 232 77 225 80 210L94 155C108 130 120 94 120 55C120 16 100 0 80 0Z" fill="rgba(52,52,52,0.18)"/>
    <!-- Checkmark -->
    <path d="M10 100L28 125L70 70" stroke="rgba(52,52,52,0.25)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  <!-- Label -->
  <text x="400" y="640" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="rgba(52,52,52,0.35)" letter-spacing="6">INTERIOR DA CLÍNICA</text>
  <text x="400" y="665" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="rgba(52,52,52,0.25)" letter-spacing="3">Substituir pela foto real</text>
