<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ddd5d6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b9bdbe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#343434;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#343434;stop-opacity:0.04" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="900" fill="url(#bg)"/>
  <!-- Subtle pattern -->
  <rect width="800" height="900" fill="url(#accent)"/>
