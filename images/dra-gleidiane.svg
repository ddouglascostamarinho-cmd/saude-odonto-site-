<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ddd5d6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b9bdbe;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg3)"/>
  <circle cx="150" cy="130" r="200" fill="rgba(255,255,255,0.18)"/>
  <circle cx="500" cy="680" r="140" fill="rgba(52,52,52,0.05)"/>
  <!-- Person silhouette (doctor female) -->
  <g transform="translate(300, 300)">
    <!-- Head -->
    <circle cx="0" cy="-120" r="62" fill="rgba(52,52,52,0.18)"/>
    <!-- Hair hint -->
    <path d="M-62-130 C-70-80-65-50 0-45 C65-50 70-80 62-130" fill="rgba(52,52,52,0.12)"/>
    <!-- Body / coat -->
    <path d="M-75 0 C-75-55-38-75 0-82 C38-75 75-55 75 0 L85 200 L-85 200 Z" fill="rgba(52,52,52,0.18)"/>
    <path d="M-22-38 L0 22 L22-38" stroke="rgba(255,255,255,0.4)" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>
  <rect x="150" y="620" width="300" height="60" rx="8" fill="rgba(52,52,52,0.1)"/>
  <text x="300" y="645" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="rgba(52,52,52,0.5)" letter-spacing="2">Dra. Gleidiane Nogueira</text>
  <text x="300" y="665" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(52,52,52,0.35)" letter-spacing="2">Substituir pela foto real</text>
</svg>
