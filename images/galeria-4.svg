  </g>
  <text x="400" y="520" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="rgba(255,255,255,0.4)" letter-spacing="6">TECNOLOGIA</text>
  <text x="400" y="545" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.25)" letter-spacing="3">Substituir pela foto real</text>
