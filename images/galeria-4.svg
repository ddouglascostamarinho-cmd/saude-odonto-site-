      <stop offset="0%" style="stop-color:#343434;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#555;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  <rect width="800" height="700" fill="url(#gal4)"/>
  <circle cx="650" cy="600" r="250" fill="rgba(255,255,255,0.04)"/>
