<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ddd5d6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b9bdbe;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg2)"/>
  <circle cx="450" cy="120" r="180" fill="rgba(255,255,255,0.18)"/>
  <circle cx="100" cy="700" r="150" fill="rgba(52,52,52,0.05)"/>
  <!-- Person silhouette (doctor) -->
  <g transform="translate(300, 300)">
    <!-- Head -->
    <circle cx="0" cy="-120" r="65" fill="rgba(52,52,52,0.18)"/>
    <!-- Body / coat -->
    <path d="M-80 0 C-80-60-40-80 0-85 C40-80 80-60 80 0 L90 200 L-90 200 Z" fill="rgba(52,52,52,0.18)"/>
    <!-- Coat collar / stethoscope hint -->
    <path d="M-25-40 L0 20 L25-40" stroke="rgba(255,255,255,0.4)" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>
  <!-- CRO tag -->
  <rect x="160" y="620" width="280" height="60" rx="8" fill="rgba(52,52,52,0.1)"/>
  <text x="300" y="645" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="rgba(52,52,52,0.5)" letter-spacing="2">Dr. Lucas Nogueira</text>
  <text x="300" y="665" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(52,52,52,0.35)" letter-spacing="2">Substituir pela foto real</text>
</svg>
